name: build_json

on:
  push:
    branches:
      - main
    paths:
      - "ZBE.xlsx"
      - "mapa_zbe.csv"
      - "scripts/build_json.py"
      - ".github/workflows/build_json.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ver archivos del repo
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== scripts ==="
          ls -la scripts || true
          echo "=== workflow ==="
          ls -la .github/workflows || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Ejecutar script
        run: |
          python scripts/build_json.py

      - name: Ver access.json generado
        run: |
          echo "=== access.json ==="
          ls -la access.json
          python - << 'PY'
          import json
          with open("access.json","r",encoding="utf-8") as f:
              data = json.load(f)
          print("Registros:", len(data))
          print("Primer registro:" if data else "Sin registros")
          if data:
              print(json.dumps(data[0], ensure_ascii=False, indent=2))
          PY

      - name: Commit access.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add access.json
          git diff --cached --quiet && echo "Sin cambios en access.json" || git commit -m "Actualizar access.json"
          git push
